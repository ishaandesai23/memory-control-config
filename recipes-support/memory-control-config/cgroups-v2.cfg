# Kernel config fragment for cgroup v2 memory accounting.
#
# It is NOT installed or used by the memory-control-config recipe; 
# the recipe only writes systemd drop-ins
# and assumes the kernel already provides the memory controller. 
# Keep kernel configuration in your own platform/BSP layer.
#
# To apply, copy this file into your kernel recipe's files/ directory and add
# it to SRC_URI in a kernel .bbappend:
#
#   SRC_URI:append:mymachine = " file://cgroups-v2.cfg"
#
# The two options that actually gate this recipe are CONFIG_CGROUPS and
# CONFIG_MEMCG. On modern kernels (>= 5.8) memory-swap and kmem accounting are
# built into CONFIG_MEMCG and no longer have their own Kconfig symbols, so the
# old CONFIG_MEMCG_SWAP / CONFIG_MEMCG_KMEM options have been dropped here.

CONFIG_CGROUPS=y
CONFIG_MEMCG=y
CONFIG_CGROUP_SCHED=y
CONFIG_FAIR_GROUP_SCHED=y
CONFIG_CFS_BANDWIDTH=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_PERF=y
CONFIG_CGROUP_BPF=y
CONFIG_BLK_CGROUP=y
CONFIG_PSI=y
CONFIG_PSI_DEFAULT_DISABLED=n
CONFIG_SWAP=y
